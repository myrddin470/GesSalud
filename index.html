<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Salud | Panel Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

<!-- ICONO EN LA PESTAÑA (Favicon estándar) -->
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

<!-- ICONO EN EL ESCRITORIO PARA DISPOSITIVOS iOS (iPhone/iPad) -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<!-- VÍNCULO AL MANIFIESTO (Para Android y Escritorio PC/Mac) -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5"> <!-- Color de la barra de estado en móvil -->
</head>
<body>
    <div id="login-container" class="auth-screen hidden">
        <div class="auth-card">
            <div class="auth-icon"><i class="fas fa-heartbeat"></i></div>
            <h2>Bienvenido de nuevo</h2>
            <p class="auth-subtitle">Introduce tus credenciales para acceder al panel</p>
            <div class="input-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" autocomplete="email">
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button id="btn-login" class="btn-primary">Iniciar Sesión</button>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <div id="app-container" class="app-layout hidden">
        <header class="topbar">
            <div class="brand">
                <div class="brand-logo"><i class="fas fa-chart-line"></i></div>
                <h1>Registro de Salud</h1>
            </div>
        </header>

        <main class="calendar-wrapper">
            <div class="calendar-control-panel">
                <button id="btn-prev-month" class="btn-nav"><i class="fas fa-chevron-left"></i></button>
                <div class="date-selectors">
                    <select id="month-select" class="select-clean"></select>
                    <select id="year-select" class="select-clean"></select>
                </div>
                <button id="btn-next-month" class="btn-nav"><i class="fas fa-chevron-right"></i></button>

                <!-- NUEVO BOTÓN PARA VOLVER AL MES ACTUAL -->
    <button id="btn-goto-today" class="btn-icon" title="Ir al mes actual">
        <i class="fas fa-calendar-day"></i></button>


            </div>

            <div class="calendar-container">
                <div class="weekdays-header">
                    <div>Lunes</div>
                    <div>Martes</div>
                    <div>Miércoles</div>
                    <div>Jueves</div>
                    <div>Viernes</div>
                    <div>Sábado</div>
                    <div class="sunday-title">Domingo</div>
                </div>
                <div id="calendar-grid" class="modern-grid"></div>
            </div>
        </main>
        
        <!-- BARRA OPERATIVA INFERIOR UNIFICADA CON LEYENDAS COMPLETAS -->
        <footer class="bottom-bar">
            <div class="footer-info">
                <p>Panel de Control de Salud <strong>©JCOS</strong></p>
            </div>

            <!-- LEYENDA CENTRAL REPARADA (PESO + SEMÁFORO DE GLUCOSA DE 70 A 100) -->
            <div class="footer-legend">
                <div class="legend-item">
                    <span class="dot dot-weight"></span>
                    <span> Peso (kg)</span>
                </div>
                <div class="legend-item">
                    <span class="dot dot-glucose"></span>
                    <span> Glucosa Normal (70-100)</span>
                </div>
                <div class="legend-item">
                    <span class="dot dot-glucose-alert"></span>
                    <span> Glucosa Desajuste (&lt;70 o &gt;100)</span>
                </div>
            </div>

            <div class="footer-actions">
                <button id="btn-pdf" class="btn-outline">
                    <i class="fas fa-file-pdf" style="color: var(--color-danger);"></i> <span>Informe PDF</span>
                </button>
                
                <button id="btn-trends" class="btn-outline">
                    <i class="fas fa-chart-line" style="color: var(--brand-color);"></i> <span>Tendencias</span>
                </button>
                
                <button id="btn-export" class="btn-outline">
                    <i class="fas fa-cloud-download-alt"></i> <span>Exportar copia</span>
                </button>
                
                <label for="file-import" class="btn-outline custom-file-upload">
                    <i class="fas fa-cloud-upload-alt"></i> <span>Importar copia</span>
                </label>
                <input id="file-import" type="file" accept=".json" style="display:none;">
                
                <div class="divider-v"></div>
                
                <button id="btn-logout" class="btn-text">
                    <i class="fas fa-power-off"></i> <span>Cerrar Sesión</span>
                </button>
            </div>
        </footer>
    </div>

    <div id="day-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <div>
                    <span class="modal-badge">Mediciones del día</span>
                    <h2 id="modal-date-title">00/00/0000</h2>
                </div>
                <button id="btn-close-modal" class="btn-close-icon"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="modal-body">
                <div class="input-group">
                    <label for="day-type">Régimen del Día</label>
                    <select id="day-type" class="input-clean">
                        <option value="laborable">Laborable</option>
                        <option value="festivo">Festivo</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="peso">Peso Corporal (kg)</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-weight-scale icon-left"></i>
                        <input type="number" id="peso" step="0.1" placeholder="00.0" class="input-clean">
                    </div>
                </div>

                <div class="input-group">
                    <label for="glucosa">Nivel de Glucosa (mg/dL)</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-droplet icon-left" style="color: #10b981;"></i>
                        <input type="number" id="glucosa" placeholder="000" class="input-clean">
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button id="btn-delete" class="btn-action-delete hidden"><i class="fas fa-trash-can"></i> Eliminar</button>
                <div class="modal-footer-rights">
                    <button id="btn-cancel" class="btn-action-cancel">Cancelar</button>
                    <button id="btn-save" class="btn-action-save">Guardar cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
